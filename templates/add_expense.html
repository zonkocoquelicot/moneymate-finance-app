{% extends "base.html" %}

{% block title %}Add Expense - MoneyMate{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-plus-circle"></i> Add New Expense
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/add-expense">
                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            <i class="bi bi-currency-rupee"></i> Amount *
                        </label>
                        <input type="number" class="form-control form-control-lg" 
                               name="amount" placeholder="0.00" step="0.01" min="0.01" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            <i class="bi bi-tag"></i> Category *
                        </label>
                        <select class="form-select form-select-lg" name="category" required>
                            <option value="">Choose category...</option>
                            <option value="Food">🍔 Food & Dining</option>
                            <option value="Transport">🚗 Transportation</option>
                            <option value="Entertainment">🎮 Entertainment</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Bills">📄 Bills & Utilities</option>
                            <option value="Health">💊 Health & Fitness</option>
                            <option value="Education">📚 Education</option>
                            <option value="Other">📦 Other</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            <i class="bi bi-chat-left-text"></i> Description
                        </label>
                        <textarea class="form-control" name="description" rows="3" 
                                  placeholder="What did you spend on? (optional)"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            <i class="bi bi-calendar"></i> Date *
                        </label>
                        <input type="date" class="form-control" name="date" 
                               value="{{ today }}" required>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="/dashboard" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-circle"></i> Save Expense
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-body">
                <h6 class="fw-bold mb-3">
                    <i class="bi bi-lightbulb text-warning"></i> Quick Tips
                </h6>
                <ul class="small text-muted mb-0">
                    <li>Be consistent with categorization</li>
                    <li>Add descriptions to track exactly what you bought</li>
                    <li>Update expenses daily for accurate tracking</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelector('input[name="date"]').valueAsDate = new Date();
</script>
{% endblock %}
