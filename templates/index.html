<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMate - AI Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }
        .hero-content {
            text-align: center;
            color: white;
        }
        .hero-icon {
            font-size: 120px;
            margin-bottom: 30px;
        }
        .btn-get-started {
            padding: 15px 50px;
            font-size: 1.2rem;
            border-radius: 50px;
            background: white;
            color: #667eea;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-get-started:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-lg-8 mx-auto hero-content">
                <div class="hero-icon">
                    <i class="bi bi-wallet2"></i>
                </div>
                <h1 class="display-1 fw-bold mb-4">MoneyMate</h1>
                <p class="lead mb-5">
                    Your AI-powered personal finance companion.<br>
                    Track expenses, manage budgets, and achieve your financial goals.
                </p>
                <a href="/dashboard" class="btn btn-get-started">
                    Get Started <i class="bi bi-arrow-right ms-2"></i>
                </a>
                <div class="mt-5">
                    <p class="text-white-50">
                        <i class="bi bi-check-circle me-2"></i> AI-Powered Insights
                        <i class="bi bi-check-circle ms-4 me-2"></i> Smart Budgeting
                        <i class="bi bi-check-circle ms-4 me-2"></i> Goal Tracking
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
